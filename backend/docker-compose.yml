services:
  postgres:
    image: postgres:16-alpine
    container_name: coracao-gaucho-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coracao_gaucho
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coracao_gaucho"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
